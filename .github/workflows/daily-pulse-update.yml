name: Daily Pulse Update

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update Pulse data
        run: node scripts/update-pulse.js

      - name: Commit updated Pulse data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily CupPulse data"
          file_pattern: data/pulse.json
